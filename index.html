<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumina — Donaciones</title>

  <style>
    :root {
      --bg: #0e0e0e;
      --card: #1a1a1a;
      --gold: #c9a84c;
      --text: #ffffff;
      --muted: #888;
      --error: #ff4d4f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: var(--card);
      padding: 40px;
      border-radius: 16px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
      font-weight: 600;
    }

    p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 25px;
    }

    .amount-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .amount-btn {
      padding: 12px;
      border: 1px solid #333;
      background: transparent;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.2s;
    }

    .amount-btn:hover {
      border-color: var(--gold);
    }

    .amount-btn.active {
      background: var(--gold);
      color: black;
      border-color: var(--gold);
      font-weight: bold;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group span {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
    }

    input {
      width: 100%;
      padding: 12px 12px 12px 28px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #111;
      color: white;
      outline: none;
    }

    input:focus {
      border-color: var(--gold);
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 15px;
      font-size: 13px;
      text-align: center;
      color: var(--muted);
      min-height: 18px;
    }

    .error {
      color: var(--error);
    }

    .success {
      color: #4caf50;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Donar</h1>
  <p>Tu aporte cambia vidas</p>

  <div class="amount-grid">
    <button class="amount-btn" onclick="selectAmount(this,15)">$15</button>
    <button class="amount-btn active" onclick="selectAmount(this,40)">$40</button>
    <button class="amount-btn" onclick="selectAmount(this,100)">$100</button>
  </div>

  <div class="input-group">
    <span>$</span>
    <input type="number" id="customAmount" placeholder="Otro monto" oninput="customInput()">
  </div>

  <button class="submit-btn" id="payBtn" onclick="processDonation()">
    Donar ahora
  </button>

  <div class="status" id="status"></div>
</div>

<script>
let selectedAmount = 40;
let isProcessing = false;

// 🔥 BACKEND REAL
const API_URL = "https://donacion-5iod.onrender.com/api/create-payment";

function setStatus(msg, type = "") {
  const el = document.getElementById("status");
  el.innerText = msg;
  el.className = "status " + type;
}

function selectAmount(btn, amount) {
  document.querySelectorAll(".amount-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  selectedAmount = amount;
  document.getElementById("customAmount").value = "";
  setStatus("");
}

function customInput() {
  document.querySelectorAll(".amount-btn").forEach(b => b.classList.remove("active"));
  selectedAmount = parseFloat(document.getElementById("customAmount").value) || 0;
}

async function processDonation() {
  if (isProcessing) return;
  isProcessing = true;

  const btn = document.getElementById("payBtn");

  try {
    const amount = Number(selectedAmount);

    if (!amount || amount <= 0) {
      setStatus("Ingresa un monto válido", "error");
      return;
    }

    if (amount > 10000000) {
      setStatus("Monto demasiado alto", "error");
      return;
    }

    btn.innerText = "Procesando...";
    btn.disabled = true;
    setStatus("Conectando con servidor...");

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 10000);

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ amount }),
      signal: controller.signal
    });

    clearTimeout(timeout);

    if (!res.ok) {
      throw new Error("Error servidor");
    }

    const data = await res.json();

    if (!data.url) {
      throw new Error("Respuesta inválida");
    }

    setStatus("Redirigiendo a pago...", "success");

    window.location.href = data.url;

  } catch (err) {
    console.error(err);

    if (err.name === "AbortError") {
      setStatus("El servidor tardó demasiado", "error");
    } else {
      setStatus("Error al procesar el pago", "error");
    }

  } finally {
    btn.innerText = "Donar ahora";
    btn.disabled = false;
    isProcessing = false;
  }
}
</script>

</body>
</html>
