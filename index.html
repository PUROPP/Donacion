<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina Donaciones</title>

  <style>
    :root {
      --bg: #0e0e0e;
      --card: #1a1a1a;
      --gold: #c9a84c;
      --text: #ffffff;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: var(--card);
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      width: 320px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .amount-btn {
      margin: 5px;
      padding: 10px 15px;
      border: 1px solid #333;
      background: none;
      color: white;
      cursor: pointer;
    }

    .amount-btn.active {
      background: var(--gold);
      color: black;
    }

    input {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #111;
      border: 1px solid #333;
      color: white;
    }

    .submit-btn {
      margin-top: 20px;
      padding: 15px;
      width: 100%;
      background: var(--gold);
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Donar</h1>

    <div>
      <button class="amount-btn" onclick="selectAmount(this, 15)">$15</button>
      <button class="amount-btn active" onclick="selectAmount(this, 40)">$40</button>
      <button class="amount-btn" onclick="selectAmount(this, 100)">$100</button>
    </div>

    <input type="number" id="customAmount" placeholder="Otro monto" oninput="customInput()">

    <button class="submit-btn" onclick="processDonation()">Donar ahora</button>
  </div>

  <script>
    let selectedAmount = 40;
    let isProcessing = false;

    // ⚠️ CAMBIA ESTO CUANDO SUBAS BACKEND
    const API_URL = "http://localhost:3000/api/create-payment";

    function selectAmount(btn, amount) {
      document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedAmount = amount;
      document.getElementById('customAmount').value = "";
    }

    function customInput() {
      document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
      selectedAmount = parseFloat(document.getElementById('customAmount').value) || 0;
    }

    async function processDonation() {
      if (isProcessing) return;
      isProcessing = true;

      const btn = document.querySelector(".submit-btn");
      const originalText = btn.innerText;

      try {
        const amount = Number(selectedAmount);

        if (!amount || amount <= 0) {
          alert("Monto inválido");
          return;
        }

        btn.innerText = "Procesando...";
        btn.disabled = true;

        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ amount })
        });

        const data = await res.json();

        if (!data.url) throw new Error();

        window.location.href = data.url;

      } catch (err) {
        console.error(err);
        alert("Error en el pago");
      } finally {
        btn.innerText = originalText;
        btn.disabled = false;
        isProcessing = false;
      }
    }
  </script>

</body>
</html>
